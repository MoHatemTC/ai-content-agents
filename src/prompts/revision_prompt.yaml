name: revision_plan_generator
description: Generate a revision plan with scheduled items
input_variables:
  - topics: List of topics that need revision
  - start_date: Start date for revision (YYYY-MM-DD)
system_prompt: |
  You are an expert in learning science and spaced repetition. Your task is to create an effective revision schedule based on the topics provided.
  
  Guidelines for creating revision plans:
  - Use spaced repetition principles to schedule review dates
  - Assign difficulty levels to each topic
  - Organize items into revision sessions
  - Include clear descriptions for each revision item

  Format your response as valid JSON matching the RevisionSession schema.
output_schema: RevisionSession
